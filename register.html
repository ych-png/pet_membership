<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - 벨루나펫</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="page-wrapper">
        <h3 class="title">벨루나펫 멤버쉽 가입</h3>
        <form id="registerForm">
            <div class="form-group"><label>이름</label><input type="text" id="regName" class="form-control" required></div>
            <div class="form-group"><label>이메일 주소</label><input type="email" id="regEmail" class="form-control" required></div>
            <div class="form-group"><label>반려동물 정보</label><input type="text" id="regPet" class="form-control" required></div>
            <div class="form-group"><label>비밀번호</label><input type="password" id="regPw" class="form-control" required></div>
            <button type="submit" class="form-btn">멤버쉽 회원가입</button>
        </form>
    </div>

    <script>
        // 2. 내 Supabase 프로젝트 정보 설정
        const SUPABASE_URL = "https://qemfpmnsywfzuyzozkqj.supabase.co/rest/v1/"; 
        const SUPABASE_ANON_KEY = "sb_publishable_m6B4hq2B-txvZ09ha5bLrQ_CG7HcnhS"; 
        
        // Supabase 클라이언트 실행
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pet = document.getElementById('regPet').value.trim();
            const password = document.getElementById('regPw').value;

            // [핵심 로직 A] Supabase 전용 회원가입 (비밀번호 자동 암호화 및 가입 처리)
            const { data: authData, error: authError } = await supabase.auth.signUp({
                email: email,
                password: password
            });

            if (authError) {
                alert('회원가입 실패: ' + authError.message);
                return;
            }

            // [핵심 로직 B] 인증에 성공하면, 해당 사용자의 고유 ID(UUID)를 매칭하여 profiles 테이블에 추가 정보 저장
            if (authData.user) {
                const { error: dbError } = await supabase
                    .from('profiles')
                    .insert([
                        { 
                            id: authData.user.id, // Supabase Auth 시스템이 준 고유 식별키
                            name: name, 
                            email: email,
                            pet_info: pet, 
                            grade: '준회원' 
                        }
                    ]);

                if (dbError) {
                    alert('데이터베이스 저장 실패: ' + dbError.message);
                    return;
                }

                alert('벨루나펫 회원가입이 성공했습니다! 이메일 인증함 또는 로그인 페이지를 확인하세요.');
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
