<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 벨루나펫</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0ea5e9;       
            --primary-dark: #0284c7;
            --secondary-color: #0f172a;     
            --bg-light: #f8fafc;
            --white: #ffffff;
            --border-color: #e2e8f0;
            --transition: all 0.3s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .page-wrapper {
            background-color: var(--white);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }
        .title { font-size: 24px; font-weight: 700; color: var(--secondary-color); text-align: center; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #64748b; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--secondary-color); }
        .form-control { width: 100%; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; font-size: 15px; transition: var(--transition); }
        .form-control:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15); }
        .form-btn { width: 100%; padding: 14px; background-color: var(--primary-color); color: var(--white); border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: var(--transition); margin-top: 10px; }
        .form-btn:hover { background-color: var(--primary-dark); }
        .form-switch { text-align: center; margin-top: 20px; font-size: 14px; color: #64748b; }
        .form-switch a { color: var(--primary-color); font-weight: 500; text-decoration: underline; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="page-wrapper">
        <h3 class="title">벨루나펫 멤버쉽 가입</h3>
        <p class="subtitle">평생 맞춤형 혜택을 시작해 보세요.</p>
        <form id="registerForm">
            <div class="form-group">
                <label for="regName">이름</label>
                <input type="text" id="regName" class="form-control" placeholder="홍길동" required>
            </div>
            <div class="form-group">
                <label for="regEmail">이메일 주소</label>
                <input type="email" id="regEmail" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label for="regPet">반려동물 이름 / 종류</label>
                <input type="text" id="regPet" class="form-control" placeholder="예: 초코 (푸들)" required>
            </div>
            <div class="form-group">
                <label for="regPw">비밀번호</label>
                <input type="password" id="regPw" class="form-control" placeholder="영문, 숫자 포함 8자 이상" required>
            </div>
            <button type="submit" id="submitBtn" class="form-btn">멤버쉽 회원가입</button>
        </form>
        <div class="form-switch">
            이미 계정이 있으신가요? <a href="login.html">로그인하기</a>
        </div>
    </div>

    <script>
        // 프로젝트 주소 및 API Key 설정 
        const SUPABASE_URL = "https://qemfpmnsywfzuyzozkqj.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_m6B4hq2B-txvZ09ha5bLrQ_CG7HcnhS";
        
        let supabaseClient;
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (err) {
            console.error("Supabase 초기화 치명적 실패:", err);
        }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "가입 처리 중...";

            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pet = document.getElementById('regPet').value.trim();
            const password = document.getElementById('regPw').value;

            try {
                // 1. Supabase Auth 시스템 연동 계정 삽입
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password
                });

                if (authError) {
                    alert('회원가입 실패: ' + authError.message);
                    return;
                }

                // [핵심 수정]: 이메일 인증 대기 상태라 하더라도 user 데이터가 확인되면 무조건 연동 프로세스 진행
                const user = authData?.user;

                if (user) {
                    // 2. belluna_register 테이블에 관계 데이터 저장
                    const { error: dbError } = await supabaseClient
                        .from('belluna_register')
                        .insert([
                            { 
                                id: user.id, // 유저 고유 UUID 동기화
                                name: name, 
                                email: email,
                                pet_info: pet, 
                                grade: '준회원' 
                            }
                        ]);

                    if (dbError) {
                        console.error("DB 상세 예외 트래킹:", dbError);
                        alert('인증 계정은 확보되었으나 맞춤 프로필 데이터베이스 적재에 실패했습니다: ' + dbError.message);
                        return;
                    }

                    // Supabase 기본 이메일 템플릿의 강제 리다이렉션을 끊고 우리 고유 스크립트로 안전 이동 처리
                    alert('벨루나펫 회원가입이 안전하게 완료되었습니다! 로그인 페이지로 이동합니다.');
                    window.location.href = 'login.html';
                    return; 
                }
            } catch (error) {
                console.error("인프라 네트워크 통신 오류:", error);
                alert('네트워크 또는 시스템 지연이 발생했습니다. API Key 상태를 재점검해 주세요.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "멤버쉽 회원가입";
            }
        });
    </script>
</body>
</html>
