<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>벨루나펫 - 프리미엄 케어 플랫폼</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,600;0,700&display=swap" rel="stylesheet">
    
    <!-- 외부 스타일에 구애받지 않도록 내부 마스터 스타일로 제어합니다 -->
    <link rel="stylesheet" href="style.css">

    <style>
        :root {
            --bg-dark: #0b0f19;
            --gold-primary: #c5a880;
            --gold-dark: #a3845b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(197, 168, 128, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark) !important;
            color: var(--text-light) !important;
            font-family: 'Noto Sans KR', sans-serif;
            padding-top: 100px !important; /* PC 헤더 높이만큼 본문 내리기 */
        }

        /* ========================================================
           ✨ [마스터 헤더] PC 레이아웃 (기본 좌우 정렬 구조)
        ======================================================== */
        header {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100px !important;
            background: rgba(11, 15, 25, 0.9) !important;
            backdrop-filter: blur(15px) !important;
            -webkit-backdrop-filter: blur(15px) !important;
            border-bottom: 1px solid rgba(197, 168, 128, 0.15) !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            padding: 0 50px !important;
            z-index: 2000 !important;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3) !important;
        }

        .logo-area {
            display: flex !important;
            align-items: center !important;
            flex-shrink: 0 !important; /* 모바일에서 로고가 찌그러지지 않게 고정 */
        }
        
        .logo-symbol-nav {
            height: 54px !important;
            width: auto !important;
            object-fit: contain !important;
            display: block !important;
        }

        /* 내비게이션 영역 베이스 */
        .auth-buttons {
            display: flex !important;
            align-items: center !important;
            gap: 32px !important;
            background: transparent !important;
            padding: 0 !important;
        }

        /* 헤더 메뉴 링크 스타일 */
        .nav-btn {
            text-decoration: none !important;
            color: rgba(248, 250, 252, 0.7) !important;
            font-size: 14px !important;
            font-weight: 400 !important;
            letter-spacing: 0.5px !important;
            transition: all 0.3s ease !important;
            position: relative !important;
            padding: 8px 0 !important;
            border: none !important;
            background: transparent !important;
            flex-shrink: 0 !important; /* 슬라이드 작동 시 글자가 끊겨서 줄바꿈되지 않도록 방지 */
        }

        .nav-btn:hover {
            color: #ffffff !important;
        }

        /* 호버 시 밑줄 효과 */
        .nav-btn::after {
            content: '' !important;
            position: absolute !important;
            bottom: 0 !important;
            left: 50% !important;
            width: 0 !important;
            height: 1px !important;
            background-color: var(--gold-primary) !important;
            transition: all 0.3s ease !important;
            transform: translateX(-50%) !important;
        }
        
        .nav-btn:hover::after {
            width: 100% !important;
        }

        /* 테두리가 있는 멤버쉽 가입 버튼 */
        .nav-btn.active-btn {
            border: 1px solid var(--gold-primary) !important;
            padding: 9px 22px !important;
            border-radius: 4px !important;
            color: var(--gold-primary) !important;
            font-weight: 500 !important;
        }
        .nav-btn.active-btn::after {
            display: none !important;
        }
        .nav-btn.active-btn:hover {
            background: rgba(197, 168, 128, 0.1) !important;
            color: #ffffff !important;
            border-color: #ffffff !important;
        }

        /* 메인 인트로 센터 영역 (메인 홈 전용) */
        .main-welcome {
            max-width: 800px;
            margin: 150px auto 50px auto;
            text-align: center;
            padding: 0 20px;
        }
        .main-welcome h1 {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
            line-height: 1.3;
        }
        .main-welcome h1 span {
            color: var(--gold-primary);
        }
        .main-welcome p {
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 300;
            line-height: 1.6;
        }

        /* ========================================================
           📱 [모바일 스크린 최적화 및 터치 가로 슬라이드 기능 구현]
        ======================================================== */
        @media (max-width: 1024px) {
            header { padding: 0 24px !important; }
            .auth-buttons { gap: 24px !important; }
        }

        @media (max-width: 768px) {
            body { 
                padding-top: 135px !important; /* 모바일 헤더가 2줄로 배치되므로 상단 여백 확대 */
            }
            
            header {
                height: auto !important;
                padding: 15px 0 12px 0 !important; /* 양옆 패딩을 줄여 스크롤 끝단 최적화 */
                flex-direction: column !important;
                gap: 12px !important;
            }

            .logo-area {
                width: 100% !important;
                justify-content: center !important; /* 로고는 상단 중앙에 고정 */
            }

            /* 🎯 핵심 수정: 모바일 전용 가로 스크롤/슬라이드 인터페이스 활성화 */
            .auth-buttons {
                width: 100% !important;
                justify-content: flex-start !important; /* 스크롤이 왼쪽부터 시작하도록 설정 */
                gap: 20px !important;                 /* 터치하기 편한 여유로운 버튼 간격 */
                overflow-x: auto !important;          /* 가로 스크롤(슬라이드) 권한 강제 허용 */
                overflow-y: hidden !important;        /* 세로 움직임 원천 차단 */
                white-space: nowrap !important;        /* 메뉴 아이템들이 한 줄로 나란히 유지되도록 설정 */
                padding: 0 24px 8px 24px !important;  /* 좌우 여백을 주어 잘려 보이지 않게 설계 */
                
                /* 스크롤 제스처 부드럽게 만들기 (iOS/Android) */
                -webkit-overflow-scrolling: touch !important; 
            }

            /* 슬라이드 편의를 위해 스크롤바는 깔끔하게 숨김 처리 */
            .auth-buttons::-webkit-scrollbar {
                display: none !important;
            }

            .nav-btn { 
                font-size: 14px !important; 
                display: inline-block !important;
            }
            
            /* 가입 버튼도 스크롤라인 안에서 무너지지 않도록 패딩 최적화 */
            .nav-btn.active-btn { 
                padding: 6px 16px !important; 
            }

            .main-welcome h1 { font-size: 28px; }
            .main-welcome p { font-size: 14px; }
        }
    </style>
</head>
<body>

    <!-- 📌 PC에서는 고정 정렬 / 모바일에서는 가로 슬라이드가 완벽 작동하는 반응형 헤더 -->
    <header>
        <div class="logo-area">
            <a href="index.html">
                <img src="beluna_symbol.png" alt="Beluna Symbol" class="logo-symbol-nav">
            </a>
        </div>
        <div class="auth-buttons" id="navAuthArea">
            <!-- 각 텍스트에 flex-shrink:0을 주어 슬라이드 도중 자물쇠처럼 글자가 고정됩니다 -->
            <a href="life_shopping.html" class="nav-btn">라이프/쇼핑</a>
            <a href="#" class="nav-btn">동물병원 케어</a>
            <a href="#" class="nav-btn">장례 서비스</a>
            <a href="login.html" class="nav-btn">로그인</a>
            <a href="register.html" class="nav-btn active-btn">멤버쉽 가입</a>
        </div>
    </header>

    <!-- 메인 환영 섹션 공간 -->
    <div class="main-welcome">
        <h1>프리미엄 반려생활의 시작<br><span>벨루나 펫</span>에 오신 것을 환영합니다</h1>
        <p>최고의 전문 의료 매칭부터 프리미엄 시크릿 커머스 쇼핑, 그리고 마지막 안식까지<br>벨루나 멤버쉽 전용 프리미엄 토탈 홈 케어 서비스를 만나보세요.</p>
    </div>

    <footer style="text-align: center; padding: 40px 20px; font-size: 12px; color: rgba(148, 163, 184, 0.2); border-top: 1px solid rgba(255, 255, 255, 0.01); font-family: 'Playfair Display', serif; letter-spacing: 1px; margin-top: 200px;">
        &copy; BELUNA PET. All Rights Reserved.
    </footer>

    <!-- Firebase 회원 동적 매칭 (로그인 후 가로 슬라이드 구조 자동 보존 연동) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                let userName = "멤버쉽";
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) userName = userDoc.data().name || "멤버쉽";
                } catch (e) { console.error(e); }

                // 로그인 완료 시 새로 꽂히는 DOM 메뉴 구조 역시 무너지지 않고 가로 슬라이드가 이어지도록 맞춤 설계
                document.getElementById('navAuthArea').innerHTML = `
                    <a href="life_shopping.html" class="nav-btn">라이프/쇼핑</a>
                    <a href="#" class="nav-btn">동물병원 케어</a>
                    <a href="#" class="nav-btn">장례 서비스</a>
                    <span style="font-size: 14px; color: rgba(255,255,255,0.2); flex-shrink:0; padding: 0 2px;">|</span>
                    <span style="font-size: 14px; color: var(--gold-primary); font-weight: 500; flex-shrink:0;">${userName}님</span>
                    <a href="#" id="logoutBtn" class="nav-btn" style="color: rgba(248, 250, 252, 0.4) !important;">로그아웃</a>
                `;

                document.getElementById('logoutBtn').addEventListener('click', (e) => {
                    e.preventDefault();
                    signOut(auth).then(() => window.location.reload());
                });
            }
        });
    </script>
</body>
</html>
