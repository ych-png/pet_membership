<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>벨루나펫 - 프리미엄 브랜드관 이동</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0f19; /* 메인 화면과 통일된 딥 네이비 배경 */
            color: #f8fafc;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loading-box {
            border: 1px solid rgba(197, 168, 128, 0.2);
            padding: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }
        .brand-title {
            font-family: 'Playfair Display', serif;
            color: #c5a880; /* 골드 포인트 컬러 */
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
        .text {
            font-size: 15px;
            color: #94a3b8;
            margin-bottom: 24px;
            font-weight: 300;
        }
        /* 고급스러운 무한 로딩 애니메이션 바 */
        .spinner-bar {
            width: 100%;
            height: 2px;
            background-color: rgba(197, 168, 128, 0.1);
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }
        .spinner-bar::after {
            content: '';
            position: absolute;
            left: -50%;
            width: 50%;
            height: 100%;
            background-color: #c5a880;
            animation: loading 1.5s infinite linear;
        }
        @keyframes loading {
            0% { left: -50%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>

    <div class="loading-box">
        <h2 class="brand-title">NATURAL CORE</h2>
        <p class="text">네츄럴코어 프리미엄 브랜드관으로<br>안전하게 이동하고 있습니다.</p>
        <div class="spinner-bar"></div>
    </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
        const targetUrl = "https://naturalcore.co.kr/";

        setTimeout(function() {
            // 새 창을 띄우지 않고, 현재 화면을 네츄럴코어로 바로 변경합니다.
            window.location.href = targetUrl;
        }, 2000); // 2초 대기 후 바로 이동
    });
</script>
</body>
</html>
