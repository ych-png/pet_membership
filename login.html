<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 벨루나펫</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0ea5e9;       
            --primary-dark: #0284c7;
            --secondary-color: #0f172a;     
            --bg-light: #f8fafc;
            --white: #ffffff;
            --border-color: #e2e8f0;
            --transition: all 0.3s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .page-wrapper {
            background-color: var(--white);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }
        .title { font-size: 24px; font-weight: 700; color: var(--secondary-color); text-align: center; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #64748b; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--secondary-color); }
        .form-control { width: 100%; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; font-size: 15px; transition: var(--transition); }
        .form-control:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15); }
        .form-btn { width: 100%; padding: 14px; background-color: var(--primary-color); color: var(--white); border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: var(--transition); margin-top: 10px; }
        .form-btn:hover { background-color: var(--primary-dark); }
        .form-switch { text-align: center; margin-top: 20px; font-size: 14px; color: #64748b; }
        .form-switch a { color: var(--primary-color); font-weight: 500; text-decoration: underline; }
    </style>

    <!-- 1. Supabase CDN 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="page-wrapper">
        <h3 class="title">반가워요, 벨루나펫입니다!</h3>
        <p class="subtitle">회원 정보로 로그인해 주세요.</p>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginId">이메일 주소</label>
                <input type="email" id="loginId" class="form-control" placeholder="example@bellunapet.co.kr" required>
            </div>
            <div class="form-group">
                <label for="loginPw">비밀번호</label>
                <input type="password" id="loginPw" class="form-control" placeholder="비밀번호를 입력하세요" required>
            </div>
            <button type="submit" class="form-btn">로그인</button>
        </form>
        <div class="form-switch">
            아직 회원이 아니신가요? <a href="register.html">회원가입하기</a>
        </div>
    </div>

    <script>
        // 2. Supabase 설정 (유저님의 회원가입 파일에 있는 것과 똑같은 Key 값을 넣어주세요!)
        const SUPABASE_URL = "유저님의_SUPABASE_URL";
        const SUPABASE_ANON_KEY = "유저님의_SUPABASE_ANON_KEY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginId').value.trim();
            const password = document.getElementById('loginPw').value;

            try {
                // 3. Supabase Auth를 이용하여 이메일/패스워드 로그인 시도
                const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                // 계정이 없거나 비밀번호가 틀렸을 때 처리
                if (authError) {
                    alert('이메일 또는 비밀번호가 올바르지 않습니다.');
                    console.error('로그인 실패 원인:', authError.message);
                    return;
                }

                // 로그인 성공한 유저의 고유 ID(UUID) 가져오기
                const userId = authData.user.id;

                // 4. 맞춤 프로필 테이블(belluna_register)에서 가입 시 기입했던 이름(name) 조회
                const { data: profileData, error: profileError } = await supabaseClient
                    .from('belluna_register')
                    .select('name')
                    .eq('id', userId)
                    .single();

                let userName = "고객"; // 만약 이름을 찾지 못할 경우 대비한 기본값
                if (profileData && !profileError) {
                    userName = profileData.name;
                }

                // 5. 로그인 정보 세션스토리지 보존 및 완료 처리
                sessionStorage.setItem('login_session', JSON.stringify({ 
                    email: authData.user.email,
                    name: userName
                }));

                alert(`${userName}님, 환영합니다!`);
                window.location.href = 'index.html'; // 로그인 성공 시 메인으로 이동

            } catch (error) {
                console.error("통신 에러 발생:", error);
                alert("로그인 처리 중 오류가 발생했습니다.");
            }
        });
    </script>
</body>
</html>
