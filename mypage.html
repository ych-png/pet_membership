<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - 벨루나펫</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0ea5e9;       
            --primary-dark: #0284c7;
            --secondary-color: #0f172a;     
            --bg-light: #f8fafc;
            --white: #ffffff;
            --border-color: #e2e8f0;
            --transition: all 0.3s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .page-wrapper {
            background-color: var(--white);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }
        .title { font-size: 24px; font-weight: 700; color: var(--secondary-color); text-align: center; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #64748b; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--secondary-color); }
        .form-control { width: 100%; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; font-size: 15px; transition: var(--transition); }
        .form-control:disabled { background-color: var(--bg-light); color: #94a3b8; cursor: not-allowed; }
        .info-badge { display: inline-block; background-color: #e0f2fe; color: var(--primary-dark); padding: 4px 12px; border-radius: 6px; font-weight: 700; font-size: 14px; }
        .form-btn { width: 100%; padding: 14px; background-color: var(--primary-color); color: var(--white); border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: var(--transition); margin-top: 10px; }
        .form-btn:hover { background-color: var(--primary-dark); }
        .btn-danger { background-color: #ef4444; }
        .btn-danger:hover { background-color: #dc2626; }
        .back-link { display: block; text-align: center; margin-top: 20px; font-size: 14px; color: #64748b; text-decoration: none; }
        .back-link:hover { color: var(--primary-color); }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <h3 class="title">마이페이지</h3>
        <p class="subtitle">내 멤버쉽 정보 및 반려견 상태를 관리합니다.</p>
        <form id="mypageForm">
            <div class="form-group">
                <label>멤버쉽 등급</label>
                <div id="myGrade" class="info-badge">준회원</div>
            </div>
            <div class="form-group">
                <label for="myName">회원 이름</label>
                <input type="text" id="myName" class="form-control" disabled>
            </div>
            <div class="form-group">
                <label for="myEmail">이메일 계정</label>
                <input type="email" id="myEmail" class="form-control" disabled>
            </div>
            <div class="form-group">
                <label for="myPet">반려동물 정보 (수정 가능)</label>
                <input type="text" id="myPet" class="form-control" placeholder="예: 초코 (푸들)" required>
            </div>
            <button type="submit" class="form-btn">정보 수정하기</button>
            <button type="button" class="form-btn btn-danger" onclick="handleLogout()">로그아웃</button>
        </form>
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> 메인화면으로 돌아가기</a>
    </div>

    <script>
        // 비로그인 상태일 때 접근 통제(페이지 가드)
        const session = JSON.parse(sessionStorage.getItem('login_session'));
        if (!session || !session.email) {
            alert('로그인이 필요한 서비스입니다.');
            window.location.href = 'login.html';
        }

        // 유저 데이터 불러오기 및 주입
        function loadUserData() {
            const users = JSON.parse(localStorage.getItem('belluna_users')) || [];
            const currentUser = users.find(u => u.email === session.email);

            if (currentUser) {
                document.getElementById('myGrade').innerText = currentUser.grade || '준회원';
                document.getElementById('myName').value = currentUser.name;
                document.getElementById('myEmail').value = currentUser.email;
                document.getElementById('myPet').value = currentUser.pet;
            }
        }

        // 반려동물 정보 변경 저장
        document.getElementById('mypageForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const updatedPet = document.getElementById('myPet').value.trim();
            let users = JSON.parse(localStorage.getItem('belluna_users')) || [];

            users = users.map(user => {
                if (user.email === session.email) {
                    user.pet = updatedPet;
                }
                return user;
            });

            localStorage.setItem('belluna_users', JSON.stringify(users));
            alert('반려동물 정보가 수정되었습니다.');
        });

        function handleLogout() {
            if (confirm('로그아웃 하시겠습니까?')) {
                sessionStorage.removeItem('login_session');
                alert('로그아웃 되었습니다.');
                window.location.href = 'index.html';
            }
        }

        document.addEventListener('DOMContentLoaded', loadUserData);
    </script>
</body>
</html>
